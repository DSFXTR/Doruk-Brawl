<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doruk Stars | DSFX</title>
    <style>
        :root {
            --primary-blue: #00BFFF;
            --legendary-gold: #FFD700;
            --mythic-red: #FF4500;
            --rare-green: #32CD32;
            --dark-bg: #121212;
            --card-bg: #1E1E1E;
        }

        body {
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            text-align: center;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: #000;
            border-bottom: 4px solid var(--primary-blue);
        }

        .stats { font-size: 18px; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            padding: 20px;
            padding-bottom: 100px;
        }

        .brawler-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 10px;
            border: 4px solid #444;
            transition: 0.2s;
            cursor: pointer;
        }

        .brawler-card:hover { transform: scale(1.1); }
        .rarity-rare { border-color: var(--rare-green); }
        .rarity-mythic { border-color: var(--mythic-red); }
        .rarity-legendary { border-color: var(--legendary-gold); }

        .brawler-card img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            background: #333;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
        }

        .nav-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px #005f8a;
        }

        .nav-btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 24px; color: var(--legendary-gold);">DORUK STARS</div>
        <div class="stats">🏆 250 | 💎 50</div>
    </header>

    <div id="brawler-grid" class="grid-container"></div>

    <nav class="bottom-nav">
        <button class="nav-btn" onclick="menuTikla('MARKET')">MARKET</button>
        <button class="nav-btn" onclick="menuTikla('SAVAŞÇILAR')">SAVAŞÇILAR</button>
        <button class="nav-btn" onclick="menuTikla('OYNA')">OYNA</button>
    </nav>

    <script>
        // Karakter Listesi (Hepsini tek tek yazmana gerek kalmadı!)
        const names = ["Shelly", "Colt", "Bull", "Brock", "Barley", "Nita", "El Primo", "Poco", "Rosa", "Rico", "Jessie", "Dynamike", "Darryl", "Penny", "Tick", "Carl", "8-Bit", "Jacky", "Gus", "Bo", "Piper", "Pam", "Frank", "Bibi", "Bea", "Emz", "Gale", "Nani", "Colette", "Edgar", "Stu", "Belle", "Grom", "Griff", "Ash", "Lola", "Bonnie", "Sam", "Mandy", "Maisie", "Hank", "Pearl", "Larry & Lawrie", "Angelo", "Berry", "Shade", "Meeple", "Trunk", "Mortis", "Tara", "Gene", "Mr. P", "Max", "Sprout", "Lou", "Byron", "Ruffs", "Squeak", "Buzz", "Fang", "Eve", "Janet", "Otis", "Buster", "Gray", "R-T", "Willow", "Doug", "Chuck", "Charlie", "Mico", "Melodie", "Lily", "Clancy", "Moe", "Juju", "Ollie", "Lumi", "Finx", "Jae-Yong", "Alli", "Mina", "Ziggy", "Gigi", "Glowbert", "Najia", "Spike", "Crow", "Leon", "Sandy", "Surge", "Amber", "Meg", "Chester", "Cordelius", "Kit", "Draco", "Kenji", "Pierce", "Kaze", "Sirius"];

        function getRarity(index) {
            if (index < 1) return "starting";
            if (index < 9) return "rare";
            if (index < 19) return "super-rare";
            if (index < 48) return "epic";
            if (index < 86) return "mythic";
            return "legendary";
        }

        const grid = document.getElementById('brawler-grid');

        names.forEach((name, index) => {
            const rarity = getRarity(index);
            const card = document.createElement('div');
            card.className = `brawler-card rarity-${rarity}`;
            
            // Resmi temizle: Boşlukları sil ve küçük harf yap
            let cleanName = name.toLowerCase().replace(/[^a-z]/g, "");
            let imgSrc = `https://cdn-old.brawlstats.com/character-icons/${cleanName}.png`;

            card.innerHTML = `
                <img src="${imgSrc}" onerror="this.src='https://via.placeholder.com/80/444/fff?text=? '">
                <div style="margin-top:8px; font-size:14px;">${name}</div>
            `;
            
            card.onclick = () => alert(name + " seçildi!");
            grid.appendChild(card);
        });

        function menuTikla(sayfa) {
            if(sayfa === 'OYNA') alert("Savaş başlıyor! Hazırlan...");
            else if(sayfa === 'MARKET') alert("Market yakında açılacak!");
            else alert("Zaten Savaşçılar sayfasındasın.");
        }
    </script>
</body>
</html>

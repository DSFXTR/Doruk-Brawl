<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doruk Stars | DSFX</title>
    
    <style>
        :root {
            --primary-blue: #00BFFF;
            --legendary-gold: #FFD700;
            --mythic-red: #FF4500;
            --dark-bg: #1E1E1E;
            --card-bg: #2A2A2A;
        }

        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 3px solid var(--primary-blue);
        }

        .logo {
            font-weight: bold;
            font-size: 2rem;
            color: var(--legendary-gold);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding: 20px;
            padding-bottom: 100px;
        }

        .brawler-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 3px solid transparent;
            transition: 0.3s;
            cursor: pointer;
        }

        .brawler-card:hover { transform: scale(1.05); }
        .rarity-legendary { border-color: var(--legendary-gold); }
        .rarity-mythic { border-color: var(--mythic-red); }
        .rarity-rare { border-color: #32CD32; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-btn {
            background: var(--primary-blue);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">DORUK STARS</div>
        <div>🏆 250 💎 50</div>
    </header>

    <main>
        <div id="brawler-grid" class="grid-container">
            </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-btn">MARKET</button>
        <button class="nav-btn">SAVAŞÇILAR</button>
        <button class="nav-btn">OYNA</button>
    </nav>

    <script>
        const brawlers = [
            { id: 1, name: "Shelly", rarity: "rare" },
            { id: 2, name: "Mortis", rarity: "mythic" },
            { id: 3, name: "Leon", rarity: "legendary" },
            { id: 4, name: "Kaze", rarity: "legendary" },
            { id: 5, name: "Sirius", rarity: "legendary" }
        ];

        const grid = document.getElementById('brawler-grid');

        function renderBrawlers() {
            brawlers.forEach(brawler => {
                const card = document.createElement('div');
                card.className = `brawler-card rarity-${brawler.rarity}`;
                card.innerHTML = `
                    <div style="font-size: 40px;">👤</div>
                    <div style="font-weight: bold; margin-top: 10px;">${brawler.name}</div>
                    <div style="font-size: 10px; color: #aaa;">${brawler.rarity.toUpperCase()}</div>
                `;
                grid.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', renderBrawlers);
    </script>
</body>
</html>
